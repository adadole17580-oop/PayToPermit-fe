<div class="page">
  <div class="card">

    <img src="applogo.png" class="logo" />

    <h1>Reset your Password</h1>

    <p class="description">
      Enter your email address and we'll send you instructions<br />
      to reset your password
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <label>Email Address</label>

      <input
        type="email"
        formControlName="email"
        placeholder="user@liceo.edu.ph"
      />

      <small class="hint">
        Enter your Liceo email address
      </small>

      <!-- ✅ Error Messages -->
      <div
        class="error"
        *ngIf="form.get('email')?.touched && form.get('email')?.invalid"
      >
        <small *ngIf="form.get('email')?.errors?.['required']">
          Email is required
        </small>

        <small *ngIf="form.get('email')?.errors?.['email']">
          Enter a valid email format
        </small>

        <small *ngIf="form.get('email')?.errors?.['pattern']">
          Only @liceo.edu.ph emails are allowed
        </small>
      </div>

      <button type="submit" [disabled]="form.invalid">
        ✉ Send Reset Instructions
      </button>

    </form>

    <a routerLink="/login" class="back">← Back to Sign In</a>

    <div class="divider"></div>

    <p class="footer">
      Remember your password?
      <a routerLink="/login">Sign In Instead</a>
    </p>

  </div>
</div>
