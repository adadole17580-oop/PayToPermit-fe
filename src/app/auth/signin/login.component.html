<div class="login-container">
  <div class="login-card">

    <img src="applogo.png" alt="University Logo" class="logo">

    <h1>Sign In</h1>
    <p class="subtitle">Access your account</p>

    <p class="role-text" *ngIf="selectedRole">
      Logging in as: <strong>{{ selectedRole | titlecase }}</strong>
    </p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

      <div class="form-group">
        <label for="email">University Email</label>
        <input id="email" type="email" name="email" [(ngModel)]="email" placeholder="name@example.com" required email
          #emailInput="ngModel" />

        <div *ngIf="emailInput.touched && emailInput.invalid" class="error">
          Please enter a valid email address.
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password">Password</label>
          <a routerLink="/reset-password" class="forgot">Forgot password?</a>
        </div>

        <input id="password" type="password" name="password" [(ngModel)]="password" placeholder="Enter your password"
          required />
      </div>

      <button type="submit" [disabled]="!loginForm.valid">
        Access Portal
      </button>

      <div *ngIf="loginError" class="error" style="margin-top: 10px;">
        {{ loginError }}
      </div>

    </form>

    <div class="divider"></div>

    <p class="register">
      Don't have an account?
      <a routerLink="/register">Register</a>
    </p>

    <footer>
      © 2024 Liceo de Cagayan University - Pay-to-Permit System
    </footer>

  </div>
</div>
