<div class="hero">

  <div class="overlay"></div>

  <div class="content">
    <h1>Pay-to-Permit</h1>
    <p>School Cashier Management System</p>

    <div class="buttons">
      <button class="btn primary" (click)="viewFees()">View Fees</button>
      <button class="btn secondary" (click)="openUpload()">Upload Proof of Payment</button>
    </div>

    <div class="role-container">
      <button class="role-card" (click)="selectRole('student')">
        <h2>Student</h2>
        <p>Access your fees</p>
      </button>

      <button class="role-card" (click)="selectRole('admin')">
        <h2>Admin</h2>
        <p>Manage records</p>
      </button>
    </div>
  </div>

</div>

<div class="modal" *ngIf="isUploadOpen">

  <div class="modal-overlay" (click)="closeUpload()"></div>

  <div class="modal-content">
    <h3>Upload Proof of Payment</h3>

    <div class="upload-box">
      <p>Drag and drop your file here</p>
      <span>or</span>
      <button>Browse Files</button>
      <small>Supported formats: JPG, PNG, PDF</small>
    </div>

    <button class="close-btn" (click)="closeUpload()">Close</button>
  </div>

</div>
