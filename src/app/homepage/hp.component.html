<div class="homepage-layout">
  
  <div class="hp-sidebar">
    <div class="logo-section">
      <img src="assets/liceo-logo.png" alt="Liceo Logo" class="hp-logo" onerror="this.src='/assets/logo.png'">
      <h1 class="hp-title">Pay-to-Permit</h1>
      <p class="hp-subtitle">SCHOOL CASHIER<br>MANAGEMENT SYSTEM</p>
    </div>

    <div class="hp-sidebar-links">
      <a (click)="viewFees()" class="hp-link">VIEW FEES</a>
      <a (click)="openUpload()" class="hp-link">UPLOAD PROOF OF PAYMENT</a>
    </div>
  </div>

  <div class="hp-main">
    <div class="content-wrapper">
      <h1 class="main-title">Pay-to-Permit</h1>
      <p class="main-subtitle">SCHOOL CASHIER MANAGEMENT SYSTEM</p>

      <h3 class="role-prompt">Choose Your Role to Continue</h3>

      <div class="role-buttons">
        <button class="role-btn" (click)="goToLogin('student')">STUDENT</button>
        <button class="role-btn" (click)="goToLogin('admin')">ADMIN</button>
      </div>
    </div>

    <div class="footer">
      © 2024 Pay-to-Permit. All rights reserved.
    </div>
  </div>

</div>

<div class="modal" *ngIf="isUploadOpen">

  <div class="modal-overlay" (click)="closeUpload()"></div>

  <div class="modal-content">
    <h3>Upload Proof of Payment</h3>

    <div class="upload-box">
      <p>Drag and drop your file here</p>
      <span>or</span>
      <button (click)="fileInput.click()">Browse Files</button>

      <input
        type="file"
        hidden
        #fileInput
        (change)="handleFile($event)"
      />

      <small>Supported formats: JPG, PNG, PDF</small>
    </div>

    <button class="close-btn" (click)="closeUpload()">Close</button>
  </div>

</div>
