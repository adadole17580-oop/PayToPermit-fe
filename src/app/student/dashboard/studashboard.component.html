<div class="dashboard-container">
  <!-- Header -->
  <div class="header">
    <h2>📄 Pay-to-Permit System</h2>
    <div class="nav">
      <button class="active">Dashboard</button>
      <button>Notifications</button>
      <button>Profile</button>
      <button class="logout">Log Out</button>
    </div>
  </div>

  <!-- Upload Section -->
  <div class="card upload-card">
    <h3>Upload Payment Receipt</h3>
    <p>Submit your payment receipt for verification</p>

    <div class="upload-box" (click)="openUploadModal()">
      <div class="upload-content">
        <p>⬆</p>
        <small>Supported formats: JPG, PNG, PDF (Max 5MB)</small>
        <button>Choose File to Upload</button>
      </div>
    </div>
  </div>

  <!-- Submission Table -->
  <div class="card">
    <h3>Submission Report</h3>
    <p>Track the status of your uploaded receipts</p>

    <div class="table">
      <div class="row header-row">
        <span>File</span>
        <span>Permit Number</span>
        <span>Status</span>
      </div>

      <div class="row" *ngFor="let item of submissions">
        <span>{{ item.file }}</span>
        <span>{{ item.permit }}</span>
        <span>
          <span class="status" [ngClass]="item.status">
            {{ item.status }}
          </span>
        </span>
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <app-upload
    *ngIf="showUploadModal"
    (close)="closeUploadModal()"
    (upload)="handleUpload($event)">
  </app-upload>
</div>
