<div class="hero">

  <div class="bg-image"></div>
  <div class="overlay"></div>

  <div class="login-card">

    <h2 class="title">Pay-to-Permit-System</h2>
    <p class="subtitle">Enter your credentials to access your account</p>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="student@university.edu.ph"
          required
        />
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>Password</label>
          <a routerLink="/resetpass" routerLinkActive="active" class="forgot">Forgot password?</a>
        </div>

        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <button type="submit" class="login-btn">
        Login
      </button>

    </form>

    <div class="divider"></div>

    <p class="register">
      Don't have an account? <a routerLink="/register" routerLinkActive="active">Register</a>
    </p>

    <footer>
      © 2024 Liceo de Cagayan University - Pay-to-Permit System
    </footer>

  </div>

</div>
